{% extends 'base.html' %}
{% block title %}Contact Us | AI Resume Analyzer{% endblock %}

{% block content %}
<div class="py-5">
  <h2 class="mb-4">Contact Us</h2>
  <p>Have questions or feedback? We'd love to hear from you! Reach out to us using the information below or send us a message.</p>

  <form method="post" action="{{ url_for('main.contact') }}">
    <div class="mb-3">
      <label for="name" class="form-label">Your Name</label>
      <input type="text" class="form-control" id="name" name="name" required />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Your Email</label>
      <input type="email" class="form-control" id="email" name="email" required />
    </div>

    <div class="mb-3">
      <label for="message" class="form-label">Message</label>
      <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
    </div>

    <button type="submit" class="btn btn-success">Send Message</button>
  </form>
</div>
{% endblock %}
